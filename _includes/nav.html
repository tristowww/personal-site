<nav class="site-nav" aria-label="Main navigation">
  <ul class="site-nav__list">
    {% for item in site.data.navigation.main %}
      <li class="site-nav__item">
        <a href="{{ item.url | relative_url }}" class="site-nav__link{% if page.url == item.url %} site-nav__link--active{% endif %}"{% if page.url == item.url %} aria-current="page"{% endif %}>
          {{ item.title }}
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>
